<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="css/styles.css">
<style>
  * { margin: 0; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; overflow: hidden; background: #07080D; }
  #fit { transform-origin: top left; }
  .og {
    position: relative; width: 1200px; height: 630px;
    background: #07080D; overflow: hidden;
    font-family: var(--font-body);
    display: flex; align-items: center;
  }
  /* blueprint grid */
  .og::before {
    content: ''; position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(0,200,185,0.05) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,185,0.05) 1px, transparent 1px);
    background-size: 34px 34px;
  }
  /* glow washes */
  .og::after {
    content: ''; position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 78% 30%, rgba(0,200,185,0.16) 0%, transparent 55%),
      radial-gradient(ellipse at 10% 95%, rgba(239,159,39,0.10) 0%, transparent 55%);
  }
  .left { position: relative; z-index: 2; padding: 0 0 0 76px; width: 660px; }
  .logo { height: 188px; width: auto; margin-left: -8px; margin-bottom: 30px; }
  .headline {
    font-family: var(--font-display); font-weight: 700; text-transform: uppercase;
    font-size: 47px; line-height: 1.04; letter-spacing: -0.01em; color: #fff;
    margin-bottom: 20px;
  }
  .headline em { color: var(--cyan); font-style: normal; text-shadow: 0 0 22px rgba(0,200,185,0.6); }
  .sub {
    font-family: var(--font-display); font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.15em; font-size: 16px; color: rgba(226,232,240,0.62);
    display: flex; align-items: center; gap: 20px; white-space: nowrap;
  }
  .sub > span { margin: 0; }
  .sub .sep { width: 1px; height: 15px; background: rgba(0,200,185,0.4); }
  .stars { color: var(--amber); letter-spacing: 3px; font-size: 16px; }

  /* photo panel */
  .photo { position: absolute; top: 0; right: 0; width: 440px; height: 630px; z-index: 1; }
  .photo img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
  .photo::before {
    content: ''; position: absolute; inset: 0; z-index: 2;
    background: linear-gradient(90deg, #07080D 0%, rgba(7,8,13,0.5) 22%, transparent 55%);
  }
  /* corner brackets on photo */
  .br { position: absolute; width: 26px; height: 26px; border-color: var(--cyan); border-style: solid; opacity: 0.8; z-index: 3; }
  .br.tr { top: 26px; right: 26px; border-width: 2px 2px 0 0; }
  .br.bl { bottom: 26px; left: 92px; border-width: 0 0 2px 2px; }
</style>
</head>
<body>
  <div id="fit">
  <div class="og">
    <div class="photo">
      <img src="img/trainer-hero.jpg" alt="">
      <span class="br tr"></span>
      <span class="br bl"></span>
    </div>
    <div class="left">
      <img class="logo" src="img/kindred-neon-lockup.png" alt="Kindred K9">
      <h1 class="headline">Training built on<br><em>trust, not fear.</em></h1>
      <div class="sub">
        <span>Davis County, Utah</span>
        <span class="sep"></span>
        <span class="stars">★★★★★</span>
        <span>5.0 on Google</span>
      </div>
    </div>
  </div>
  </div>
  <script>
    function fit(){ var s = window.innerWidth/1200; var f=document.getElementById('fit'); f.style.transform='scale('+s+')'; document.body.style.height=(630*s)+'px'; }
    fit(); window.addEventListener('resize', fit);
  </script>
</body>
</html>
